<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeepChain Fishing 🎣</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Crimson+Pro:wght@300;400&display=swap" rel="stylesheet">

<style>
:root {
  --bg:#010610;
  --card:#0a1628;
  --cyan:#00d4ff;
  --teal:#00ffcc;
  --gold:#ffd700;
  --text:#e6f4ff;
  --dim:#7fa3c2;
}

body{
  margin:0;
  font-family:'Crimson Pro',serif;
  background:radial-gradient(circle at top,#081a30,#010610);
  color:var(--text);
  font-size:19px;
}

/* HEADER */
.header{
  text-align:center;
  padding:2rem;
}
.header h1{
  font-family:'Cinzel';
  font-size:3rem;
  background:linear-gradient(45deg,var(--cyan),var(--gold));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
.header p{color:var(--dim)}

/* BUTTON */
.btn{
  border:2px solid var(--teal);
  padding:1rem 2.5rem;
  font-size:1.2rem;
  background:none;
  color:var(--teal);
  cursor:pointer;
  border-radius:10px;
}
.btn:hover{
  background:var(--teal);
  color:#000;
  box-shadow:0 0 25px var(--teal);
}

/* CARD */
.card{
  background:rgba(10,22,40,0.85);
  border-radius:14px;
  padding:1.5rem;
  border:1px solid rgba(0,212,255,0.2);
}

/* GRID */
.grid{
  max-width:1100px;
  margin:auto;
  display:grid;
  grid-template-columns:1fr 320px;
  gap:1.5rem;
}
@media(max-width:900px){
  .grid{grid-template-columns:1fr}
}

/* WATER */
.water{
  height:200px;
  border-radius:12px;
  background:linear-gradient(#0a2a50,#021020);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:3rem;
  transition:0.3s;
}

/* ANIMATIONS */
@keyframes castAnim {
  0% { transform: translateY(0) }
  50% { transform: translateY(-10px) }
  100% { transform: translateY(0) }
}
.casting { animation: castAnim 0.6s infinite; }

@keyframes shake {
  0% { transform: translateX(0) }
  25% { transform: translateX(-5px) }
  50% { transform: translateX(5px) }
  75% { transform: translateX(-5px) }
  100% { transform: translateX(0) }
}
.strike { animation: shake 0.5s; }

/* PROGRESS BAR */
.bar{
  width:100%;
  height:10px;
  background:#001;
  margin-top:1rem;
  border-radius:10px;
  overflow:hidden;
}
.bar-fill{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,var(--cyan),var(--teal));
  transition:width 0.2s;
}

/* RESULT */
.result{
  text-align:center;
  margin-top:1rem;
  font-size:1.5rem;
}
.legendary{color:var(--gold)}
.rare{color:#a855f7}
.uncommon{color:#22c55e}

/* INPUT */
input{
  padding:0.7rem;
  font-size:1rem;
  border-radius:8px;
  border:1px solid var(--cyan);
  background:#000;
  color:#fff;
}

/* LIST */
.list{margin-top:1rem}
.list div{
  padding:0.4rem;
  border-bottom:1px solid #123;
}
</style>
</head>

<body>

<div class="header">
  <h1>⚓ DeepChain Fishing</h1>
  <p>On-chain fishing game</p>
</div>

<div id="connect" style="text-align:center">
  <button class="btn" onclick="connect()">Connect Wallet</button>
</div>

<div id="register" style="display:none;text-align:center">
  <h2>Choose Name</h2>
  <input id="name" placeholder="your name"/>
  <br><br>
  <button class="btn" onclick="register()">Start Fishing</button>
</div>

<div id="game" style="display:none" class="grid">

  <div>
    <div class="card">
      <div class="water" id="water">🌊</div>
      <button class="btn" onclick="cast()">🎣 Cast</button>
      <div class="bar"><div class="bar-fill" id="bar"></div></div>
      <div class="result" id="result"></div>
    </div>
  </div>

  <div class="card">
    <h3>Stats</h3>
    <p>Balance: <span id="bal">0</span></p>
    <p>Total: <span id="tot">0</span></p>

    <h3>Leaderboard</h3>
    <div id="lb" class="list"></div>
  </div>

</div>

<!-- SOUND -->
<audio id="splash" src="https://assets.mixkit.co/sfx/preview/mixkit-water-splash-1182.mp3"></audio>
<audio id="reel" src="https://assets.mixkit.co/sfx/preview/mixkit-fishing-reel-707.mp3"></audio>
<audio id="success" src="https://assets.mixkit.co/sfx/preview/mixkit-game-level-completed-2059.mp3"></audio>
<audio id="fail" src="https://assets.mixkit.co/sfx/preview/mixkit-arcade-retro-game-over-213.mp3"></audio>

<script>
const CONTRACT="0xA258E47F6A2D3CAf0469127677E5963093fbCA62"
const RPC="https://studio.genlayer.com/api"

let addr=null

function play(id){
  const a=document.getElementById(id)
  if(a){
    a.currentTime=0
    a.play().catch(()=>{})
  }
}

async function connect(){
  const a=await ethereum.request({method:"eth_requestAccounts"})
  addr=a[0]
  load()
}

async function call(fn,args=[]){
  const r=await fetch(RPC,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      jsonrpc:"2.0",
      method:"gen_call",
      params:[{to:CONTRACT,data:{function:fn,args}}, "latest"],
      id:1
    })
  })
  return (await r.json()).result
}

async function tx(fn,args){
  const data=JSON.stringify({function:fn,args})
  let hex="0x"
  for(let i=0;i<data.length;i++){
    hex+=data.charCodeAt(i).toString(16)
  }
  return ethereum.request({
    method:"eth_sendTransaction",
    params:[{from:addr,to:CONTRACT,data:hex}]
  })
}

async function load(){
  document.getElementById("connect").style.display="none"
  const s=JSON.parse(await call("get_stats",[addr]))

  if(!s.name || s.name==="Unknown"){
    document.getElementById("register").style.display="block"
  }else{
    startGame()
  }
}

async function register(){
  const n=document.getElementById("name").value
  await tx("register",[n])
  setTimeout(startGame,4000)
}

async function startGame(){
  document.getElementById("register").style.display="none"
  document.getElementById("game").style.display="grid"
  update()
  leaderboard()
}

async function update(){
  const s=JSON.parse(await call("get_stats",[addr]))
  document.getElementById("bal").innerText=s.balance
  document.getElementById("tot").innerText=s.total_earned
}

async function leaderboard(){
  const l=JSON.parse(await call("get_leaderboard",[]))
  document.getElementById("lb").innerHTML=
    l.map(x=>`<div>${x.name}: ${x.points}</div>`).join("")
}

async function cast(){
  const bar=document.getElementById("bar")
  const water=document.getElementById("water")

  let p=0

  water.classList.add("casting")
  play("reel")

  const interval=setInterval(()=>{
    p+=8
    bar.style.width=p+"%"
    if(p>=100)clearInterval(interval)
  },150)

  await tx("cast",[])

  setTimeout(async ()=>{
    water.classList.remove("casting")
    water.classList.add("strike")
    play("splash")

    const s=JSON.parse(await call("get_stats",[addr]))
    const c=s.recent_catches.at(-1)

    const el=document.getElementById("result")
    el.className="result "+c.rarity

    if(c.fish==="empty"){
      el.innerText="💨 Nothing..."
      play("fail")
    }else{
      el.innerText=`${c.fish} +${c.points}`
      play("success")
    }

    update()
    leaderboard()

    bar.style.width="0%"
    setTimeout(()=>water.classList.remove("strike"),500)

  },4000)
}
</script>

</body>
</html>
