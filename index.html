<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GenLayer Fishing Game</title>
<script src="https://cdn.jsdelivr.net/npm/ethers@6.7.0/dist/ethers.umd.min.js"></script>

<style>
body {
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(#0a2540, #1e3c72);
    color:white;
    text-align:center;
}

#topbar {
    position:absolute;
    top:20px;
    right:20px;
}

#wallet {
    margin-top:5px;
    font-size:14px;
    opacity:0.8;
}

button {
    padding:12px 20px;
    border:none;
    border-radius:10px;
    background:#00c6ff;
    color:black;
    font-weight:bold;
    cursor:pointer;
    margin:5px;
    font-size:16px;
}

button:hover {
    background:#00a2cc;
}

#container {
    margin-top:120px;
}

#banner {
    width:420px;
    max-width:90%;
    margin-bottom:25px;
    border-radius:20px;
    box-shadow: 0 0 25px rgba(0,0,0,0.6);
}

#ocean {
    margin:30px auto;
    width:340px;
    height:170px;
    border-radius:20px;
    background: linear-gradient(#00c6ff, #0072ff);
    position:relative;
    overflow:hidden;
}

.wave {
    position:absolute;
    width:200%;
    height:100%;
    background: rgba(255,255,255,0.2);
    border-radius:40%;
    animation: wave 6s infinite linear;
}

.wave:nth-child(2){
    animation-delay: -3s;
}

@keyframes wave {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
}

#line {
    position:absolute;
    width:2px;
    height:0;
    background:white;
    top:-60px;
    left:50%;
    transition: height 0.4s ease;
}

input {
    padding:10px;
    border-radius:8px;
    border:none;
    margin-top:10px;
    width:200px;
}

#result {
    margin-top:20px;
    font-size:22px;
    font-weight:bold;
}

#stats {
    margin-top:20px;
    font-size:18px;
    opacity:0.9;
}
</style>
</head>

<body>

<div id="topbar">
    <button onclick="connectWallet()">Connect Wallet</button>
    <div id="wallet">Not connected</div>
</div>

<div id="container">

    <img id="banner" src="assets/banner.png" alt="Fishing Game Banner">

    <div id="ocean">
        <div class="wave"></div>
        <div class="wave"></div>
        <div id="line"></div>
    </div>

    <div>
        <input id="nameInput" placeholder="Enter nickname">
        <br>
        <button onclick="register()">Register</button>
    </div>

    <div>
        <button onclick="cast()">🎣 Cast Fishing</button>
    </div>

    <div id="result"></div>
    <div id="stats"></div>

</div>

<script>
const CONTRACT = "0xA258E47F6A2D3CAf0469127677E5963093fbCA62";

let provider;
let signer;
let address;

async function connectWallet(){
    try{
        if(!window.ethereum){
            alert("Install Metamask!");
            return;
        }

        provider = new ethers.BrowserProvider(window.ethereum);
        await provider.send("eth_requestAccounts", []);
        signer = await provider.getSigner();
        address = await signer.getAddress();

        document.getElementById("wallet").innerText =
            address.slice(0,6) + "..." + address.slice(-4);

        document.getElementById("result").innerText = "Wallet connected!";
        loadStats();

    }catch(e){
        console.error(e);
    }
}

async function callContract(method, args=[]){
    console.log("CALL:", method, args);
    return "{}";
}

async function register(){
    const name = document.getElementById("nameInput").value;

    if(!name){
        alert("Enter nickname!");
        return;
    }

    document.getElementById("result").innerText = "Registering...";

    await callContract("register",[name]);

    document.getElementById("result").innerText = "Registered!";
}

async function cast(){
    if(!address){
        alert("Connect wallet first!");
        return;
    }

    const line = document.getElementById("line");

    line.style.height = "130px";

    document.getElementById("result").innerText = "Casting...";

    setTimeout(async ()=>{
        await callContract("cast");

        line.style.height = "0px";

        document.getElementById("result").innerText =
            "You caught something!";

        loadStats();

    },1500);
}

async function loadStats(){
    if(!address) return;

    await callContract("get_stats",[address]);

    document.getElementById("stats").innerText =
        "Stats loading (soon real data)";
}
</script>

</body>
</html>
