<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fishing Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: Arial, sans-serif;
}

/* FULL BACKGROUND */
body {
    background: url('banner.png') no-repeat center center;
    background-size: cover;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* DARK OVERLAY */
.overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.35);
    top: 0;
    left: 0;
}

/* CONNECT BUTTON */
#walletBtn {
    position: absolute;
    top: 20px;
    right: 20px;
    padding: 12px 20px;
    border-radius: 10px;
    border: none;
    background: #00cfff;
    font-weight: bold;
    cursor: pointer;
    z-index: 10;
}

/* CENTER BOX */
.center-box {
    position: relative;
    background: rgba(0,0,0,0.75);
    padding: 30px;
    border-radius: 16px;
    text-align: center;
    width: 340px;
    z-index: 5;
}

/* TITLE */
.center-box h2 {
    color: white;
    font-size: 26px;
    margin-bottom: 10px;
}

/* INPUT */
input {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: none;
    margin-top: 10px;
    font-size: 16px;
}

/* BUTTON */
button {
    margin-top: 15px;
    padding: 12px 20px;
    border-radius: 10px;
    border: none;
    background: #00cfff;
    font-weight: bold;
    cursor: pointer;
    font-size: 16px;
}

/* GAME UI */
#gameUI {
    display: none;
    position: absolute;
    bottom: 0;
    width: 100%;
    background: rgba(0,0,0,0.85);
    color: white;
    padding: 20px;
    text-align: center;
}

/* STATUS MESSAGE */
#status {
    position: absolute;
    top: 70px;
    right: 20px;
    padding: 8px 15px;
    border-radius: 8px;
    background: rgba(255,255,255,0.9);
    color: #333;
    font-size: 14px;
    z-index: 10;
    display: none;
}

#status.error {
    background: #ff4444;
    color: white;
}

#status.success {
    background: #44ff44;
    color: white;
}
</style>
</head>

<body>

<div class="overlay"></div>

<button id="walletBtn">Connect Wallet</button>

<div id="status"></div>

<div class="center-box">
    <h2>🎣 Fishing Game</h2>
    <input id="nicknameInput" placeholder="Enter nickname">
    <button id="startBtn">Start Game</button>
</div>

<div id="gameUI">
    Game UI here
</div>

<script>
// CONFIGURATION
const STUDIONET_CHAIN_ID = "0xF22F"; // GenLayer Studio
const RPC_URL = "https://studio.genlayer.com/api";

// STATE
let userAddress = null;
let isConnected = false;

// UI ELEMENTS
const walletBtn = document.getElementById('walletBtn');
const startBtn = document.getElementById('startBtn');
const nicknameInput = document.getElementById('nicknameInput');
const gameUI = document.getElementById('gameUI');
const status = document.getElementById('status');

// STATUS FUNCTIONS
function showStatus(message, type = '') {
    status.textContent = message;
    status.className = type;
    status.style.display = 'block';
    
    if (type === 'success') {
        setTimeout(() => {
            status.style.display = 'none';
        }, 3000);
    }
}

// WALLET CONNECTION
async function connectWallet() {
    console.log('=== WALLET CONNECTION START ===');
    
    // Check if MetaMask exists
    if (!window.ethereum) {
        showStatus('MetaMask not found. Please install MetaMask.', 'error');
        alert('🦊 MetaMask Required\n\nPlease install MetaMask browser extension to continue.\n\nDownload: https://metamask.io/download/');
        return;
    }
    
    try {
        showStatus('Connecting wallet...');
        console.log('Step 1: Checking current network...');
        
        // Get current chain
        const currentChainId = await window.ethereum.request({ method: 'eth_chainId' });
        console.log('Current chain:', currentChainId);
        
        // Check if we're on right network
        if (currentChainId !== STUDIONET_CHAIN_ID) {
            console.log('Wrong network, switching to GenLayer Studio...');
            showStatus('Switching to GenLayer Studio network...', 'info');
            await switchToStudioNet();
        }
        
        console.log('Step 2: Requesting accounts...');
        // Request accounts
        const accounts = await window.ethereum.request({ method: "eth_requestAccounts" });
        
        if (!accounts || accounts.length === 0) {
            showStatus('No accounts found. Please unlock MetaMask.', 'error');
            alert('🔓 No Accounts Found\n\nPlease unlock your MetaMask wallet and try again.');
            return;
        }
        
        console.log('Step 3: Account received:', accounts[0]);
        userAddress = accounts[0];
        isConnected = true;
        
        // Update UI
        walletBtn.textContent = `🦊 ${userAddress.substring(0, 6)}...${userAddress.substring(userAddress.length - 4)}`;
        walletBtn.style.background = '#44ff44';
        showStatus('Wallet connected!', 'success');
        
        console.log('=== WALLET CONNECTION SUCCESS ===');
        
    } catch (error) {
        console.error('Connection error:', error);
        let errorMessage = "Connection failed";
        
        // Handle specific MetaMask errors
        if (error.code === 4001) {
            errorMessage = "Connection rejected by user";
        } else if (error.code === -32002) {
            errorMessage = "Request already pending. Please check MetaMask.";
        } else if (error.code === -32603) {
            errorMessage = "No active wallet found. Please unlock MetaMask.";
        } else if (error.message) {
            errorMessage = error.message;
        }
        
        showStatus(errorMessage, 'error');
        alert('🔌 Connection Failed\n\n' + errorMessage + '\n\nPlease try again.');
    }
}

// NETWORK SWITCHING
async function switchToStudioNet() {
    try {
        await window.ethereum.request({ 
            method: "wallet_switchEthereumChain", 
            params: [{ chainId: STUDIONET_CHAIN_ID }] 
        });
        showStatus("Switched to GenLayer Studio!", "success");
    } catch (e) {
        console.error('Switch error:', e);
        if (e.code === 4902) {
            // Network doesn't exist, add it
            showStatus("Adding GenLayer Studio network...", "info");
            await addStudioNet();
        } else if (e.code === 4001) {
            showStatus("Switch rejected by user.", "error");
        } else {
            showStatus("Failed to switch: " + e.message, "error");
        }
    }
}

async function addStudioNet() {
    try {
        await window.ethereum.request({
            method: "wallet_addEthereumChain",
            params: [{
                chainId: STUDIONET_CHAIN_ID,
                chainName: "GenLayer Studio",
                nativeCurrency: { name: "GEN", symbol: "GEN", decimals: 18 },
                rpcUrls: [RPC_URL],
                blockExplorerUrls: ["https://explorer-studio.genlayer.com"],
            }]
        });
        showStatus("GenLayer Studio network added!", "success");
    } catch (error) {
        console.error('Error adding network:', error);
        if (error.code === 4001) {
            showStatus("Request rejected. Please try again.", "error");
        } else {
            showStatus("Failed to add network: " + error.message, "error");
        }
    }
}

// GAME FUNCTIONS
function startGame() {
    const nickname = nicknameInput.value.trim();
    if (!nickname) {
        showStatus('Please enter a nickname', 'error');
        return;
    }
    
    if (!isConnected) {
        showStatus('Please connect wallet first', 'error');
        return;
    }
    
    showStatus(`Starting game for ${nickname}...`, 'success');
    gameUI.style.display = 'block';
    gameUI.innerHTML = `
        <h3>🎣 ${nickname}'s Fishing Game</h3>
        <p>Wallet: ${userAddress.substring(0, 6)}...${userAddress.substring(userAddress.length - 4)}</p>
        <button onclick="castLine()">Cast Line</button>
    `;
}

function castLine() {
    showStatus('Casting line...', 'info');
    setTimeout(() => {
        showStatus('Fish caught! 🐟', 'success');
    }, 2000);
}

// EVENT LISTENERS
walletBtn.addEventListener('click', connectWallet);
startBtn.addEventListener('click', startGame);

// WALLET EVENT LISTENERS
if (window.ethereum) {
    window.ethereum.on('accountsChanged', (accounts) => {
        if (accounts.length > 0) {
            userAddress = accounts[0];
            walletBtn.textContent = `🦊 ${userAddress.substring(0, 6)}...${userAddress.substring(userAddress.length - 4)}`;
            showStatus('Account changed', 'info');
        } else {
            userAddress = null;
            isConnected = false;
            walletBtn.textContent = 'Connect Wallet';
            walletBtn.style.background = '#00cfff';
            showStatus('Wallet disconnected', 'error');
        }
    });
    
    window.ethereum.on('chainChanged', (chainId) => {
        if (chainId !== STUDIONET_CHAIN_ID) {
            showStatus('Wrong network! Please switch to GenLayer Studio.', 'error');
        } else {
            showStatus('Correct network', 'success');
        }
    });
}

// PAGE LOAD
window.addEventListener('load', () => {
    console.log('Page loaded, checking wallet...');
    if (window.ethereum) {
        console.log('MetaMask detected');
        // Check if already connected (but don't auto-connect)
        window.ethereum.request({ method: 'eth_accounts' }).then(accounts => {
            if (accounts.length > 0) {
                console.log('MetaMask is unlocked but waiting for manual connection');
            }
        });
    } else {
        console.log('MetaMask not detected');
        showStatus('MetaMask not found. Please install MetaMask extension.', 'error');
    }
});
</script>

</body>
</html>
