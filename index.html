<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GenLayer Fishing Game</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: black;
  color: white;
  overflow: hidden;
}

/* FULLSCREEN BANNER */
#landing {
  position: fixed;
  width: 100%;
  height: 100%;
  background: url('./banner.png') no-repeat center center;
  background-size: cover;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* DARK OVERLAY */
#overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
}

/* CENTER CONTENT */
#center-box {
  position: relative;
  text-align: center;
  margin-top: 150px;
}

/* TITLE */
h1 {
  font-size: 64px;
  margin: 0;
}

h2 {
  font-size: 20px;
  margin-top: 10px;
  opacity: 0.8;
}

/* INPUT */
input {
  padding: 12px;
  font-size: 18px;
  border-radius: 8px;
  border: none;
  margin-top: 40px;
}

/* BUTTON */
button {
  padding: 12px 20px;
  font-size: 18px;
  margin-top: 15px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
}

/* CONNECT BUTTON TOP RIGHT */
#connectBtn {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 10;
}

/* GAME */
#game {
  display: none;
  padding: 20px;
}
</style>
</head>

<body>

<!-- CONNECT WALLET -->
<button id="connectBtn">Connect Wallet</button>

<!-- LANDING -->
<div id="landing">
  <div id="overlay"></div>

  <div id="center-box">
    <h1>Fishing Game</h1>
    <h2>for GenLayer Community</h2>

    <input id="nickname" placeholder="Enter nickname" />
    <br>
    <button onclick="startGame()">Start Game</button>
  </div>
</div>

<!-- GAME UI -->
<div id="game">
  <h2 id="wallet"></h2>
  <h3 id="balance"></h3>

  <button onclick="cast()">🎣 Cast</button>

  <h3>Result:</h3>
  <div id="result"></div>
</div>

<script>
let account = null;

/* ✅ CONTRACT ADDRESS FIXED */
const CONTRACT = "0xA258E47F6A2D3CAf0469127677E5963093fbCA62";

/* ✅ CONNECT WALLET */
document.getElementById("connectBtn").onclick = async () => {
  if (!window.ethereum) {
    alert("Install MetaMask");
    return;
  }

  try {
    const accounts = await window.ethereum.request({
      method: "eth_requestAccounts"
    });

    account = accounts[0];

    /* ✅ ADD GENLAYER NETWORK */
    await window.ethereum.request({
      method: "wallet_addEthereumChain",
      params: [{
        chainId: "0xF22F", // 61999
        chainName: "GenLayer Studio",
        rpcUrls: ["https://studio.genlayer.com/api"],
        nativeCurrency: {
          name: "GEN",
          symbol: "GEN",
          decimals: 18
        },
        blockExplorerUrls: ["https://explorer-studio.genlayer.com"]
      }]
    });

    document.getElementById("wallet").innerText =
      "Wallet: " + account;

    alert("Connected!");

  } catch (err) {
    console.error(err);
    alert("Connection failed");
  }
};

/* START GAME */
async function startGame() {
  const name = document.getElementById("nickname").value;

  if (!account) {
    alert("Connect wallet first");
    return;
  }

  if (!name) {
    alert("Enter nickname");
    return;
  }

  /* CALL REGISTER */
  await sendTx("register", [name]);

  document.getElementById("landing").style.display = "none";
  document.getElementById("game").style.display = "block";

  loadStats();
}

/* CAST */
async function cast() {
  document.getElementById("result").innerText = "Fishing...";

  await sendTx("cast", []);

  setTimeout(loadStats, 2000);
}

/* LOAD STATS */
async function loadStats() {
  const res = await callView("get_stats", [account]);

  const data = JSON.parse(res);

  document.getElementById("balance").innerText =
    "Balance: " + data.balance;

  if (data.recent_catches.length > 0) {
    const last = data.recent_catches[data.recent_catches.length - 1];
    document.getElementById("result").innerText = last.message;
  }
}

/* VIEW CALL */
async function callView(method, args) {
  const res = await fetch(
    "https://studio.genlayer.com/api",
    {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        jsonrpc: "2.0",
        method: "gen_call",
        params: {
          to: CONTRACT,
          data: {
            method: method,
            args: args
          }
        },
        id: 1
      })
    }
  );

  const json = await res.json();
  return json.result;
}

/* SEND TX */
async function sendTx(method, args) {
  await window.ethereum.request({
    method: "eth_sendTransaction",
    params: [{
      from: account,
      to: CONTRACT,
      data: JSON.stringify({
        method: method,
        args: args
      })
    }]
  });
}
</script>

</body>
</html>
