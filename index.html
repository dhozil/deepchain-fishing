<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GenLayer Fishing Game</title>

<script src="https://cdn.jsdelivr.net/npm/ethers@6.10.0/dist/ethers.min.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b1d2a;
    color: white;
}

/* HERO FULLSCREEN */
#hero {
    position: fixed;
    width: 100%;
    height: 100vh;
    background: url("banner.png") center/cover no-repeat;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

/* CONNECT BUTTON */
#connectBtn {
    position: absolute;
    top: 25px;
    right: 25px;
    padding: 16px 28px;
    font-size: 18px;
    background: #00c3ff;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    font-weight: bold;
}

/* REGISTER BOX */
#registerBox {
    background: rgba(0,0,0,0.7);
    padding: 40px;
    border-radius: 16px;
    text-align: center;
}

#registerBox h1 {
    font-size: 42px;
    margin-bottom: 20px;
}

#registerBox input {
    padding: 16px;
    font-size: 20px;
    border-radius: 10px;
    border: none;
    width: 260px;
    margin-bottom: 15px;
}

#registerBox button {
    padding: 16px 26px;
    font-size: 20px;
    border-radius: 10px;
    border: none;
    background: #00c3ff;
    cursor: pointer;
    font-weight: bold;
}

/* GAME UI */
#game {
    display: none;
    padding: 30px;
}

.card {
    background: #112b3c;
    padding: 25px;
    border-radius: 14px;
    margin-top: 20px;
}

button {
    padding: 14px 22px;
    margin: 8px;
    border: none;
    border-radius: 10px;
    background: #00c3ff;
    cursor: pointer;
    font-size: 18px;
    font-weight: bold;
}

#animation {
    display: none;
    font-size: 26px;
    text-align: center;
    margin-top: 20px;
}

#result {
    text-align: center;
    font-size: 22px;
    margin-top: 15px;
}
</style>
</head>

<body>

<!-- HERO -->
<div id="hero">

<button id="connectBtn" onclick="connectWallet()">Connect Wallet</button>

<div id="registerBox">
    <h1>🎣 Fishing Game</h1>
    <input id="nickname" placeholder="Enter your nickname">
    <br>
    <button onclick="register()">Start Game</button>
</div>

</div>

<!-- GAME -->
<div id="game">

<h1>🎣 GenLayer Fishing Game</h1>
<p id="wallet"></p>

<div class="card">
    <h2>Player Stats</h2>
    <pre id="stats"></pre>
</div>

<div class="card">
    <h2>Actions</h2>
    <button onclick="cast()">🎣 Cast</button>
</div>

<div id="animation">🎣 Casting...</div>
<div id="result"></div>

<div class="card">
    <h2>Shop</h2>
    <button onclick="buyRod('platinum')">Platinum Rod</button>
    <button onclick="buyRod('adamantite')">Adamantite Rod</button>
    <button onclick="buyBait('worm')">Worm</button>
    <button onclick="buyBait('shrimp')">Shrimp</button>
    <button onclick="buyBait('magic_lure')">Magic Lure</button>
</div>

</div>

<script>
const CONTRACT_ADDRESS = "0xA258E47F6A2D3CAf0469127677E5963093fbCA62";

let provider, signer, contract, userAddress;

const ABI = [
    "function register(string name)",
    "function cast()",
    "function buy_rod(string)",
    "function buy_bait(string)",
    "function get_stats(address) view returns (string)"
];

async function connectWallet() {
    provider = new ethers.BrowserProvider(window.ethereum);
    signer = await provider.getSigner();
    userAddress = await signer.getAddress();

    contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);

    document.getElementById("wallet").innerText = "Wallet: " + userAddress;
}

async function register() {
    if (!contract) {
        alert("Connect wallet first!");
        return;
    }

    const name = document.getElementById("nickname").value;
    if (!name) return;

    const tx = await contract.register(name);
    await tx.wait();

    document.getElementById("hero").style.display = "none";
    document.getElementById("game").style.display = "block";

    loadStats();
}

async function cast() {
    document.getElementById("animation").style.display = "block";
    document.getElementById("result").innerText = "";

    const tx = await contract.cast();
    await tx.wait();

    document.getElementById("animation").style.display = "none";
    document.getElementById("result").innerText = "🎉 You cast your line!";

    loadStats();
}

async function buyRod(type) {
    const tx = await contract.buy_rod(type);
    await tx.wait();
    loadStats();
}

async function buyBait(type) {
    const tx = await contract.buy_bait(type);
    await tx.wait();
    loadStats();
}

async function loadStats() {
    const data = await contract.get_stats(userAddress);
    const parsed = JSON.parse(data);

    document.getElementById("stats").innerText =
        "Name: " + parsed.name + "\n" +
        "Balance: " + parsed.balance + "\n" +
        "Rod: " + parsed.rod + "\n" +
        "Bait: " + parsed.bait + "\n" +
        "Total Earned: " + parsed.total_earned;
}
</script>

</body>
</html>
