<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DeepChain Fishing 🎣</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#020818;
  color:#c8e0f0;
  text-align:center;
}

h1{
  margin-top:20px;
  color:#00d4ff;
}

button{
  padding:10px 20px;
  margin:5px;
  cursor:pointer;
  border:none;
  border-radius:6px;
}

#castBtn{
  background:#00ffcc;
  color:#000;
  font-size:18px;
}

#log{
  margin-top:20px;
  white-space:pre-wrap;
  font-size:14px;
}

input{
  padding:8px;
  width:200px;
}

/* 🎨 EFFECTS */
.legendary-flash{
  animation:legend 0.6s;
}
@keyframes legend{
  0%{background:gold}
  100%{background:#020818}
}

.rare-glow{
  box-shadow:0 0 20px purple;
}

.uncommon-glow{
  box-shadow:0 0 20px green;
}

.water{
  height:150px;
  background:linear-gradient(#0a1628,#000);
  margin:20px;
  border-radius:10px;
  position:relative;
}

.shake{
  animation:shake 0.5s;
}
@keyframes shake{
  0%{transform:translateX(0)}
  25%{transform:translateX(5px)}
  50%{transform:translateX(-5px)}
  75%{transform:translateX(5px)}
  100%{transform:translateX(0)}
}

/* popup */
#popup{
  position:fixed;
  top:0;
  left:0;
  right:0;
  bottom:0;
  background:rgba(0,0,0,0.8);
  display:none;
  justify-content:center;
  align-items:center;
}

#popupBox{
  background:#111;
  padding:20px;
  border-radius:10px;
}
</style>
</head>

<body>

<h1>🎣 DeepChain Fishing</h1>

<button onclick="connect()">Connect Wallet</button>
<button onclick="openRename()">✏️ Change Name</button>

<br><br>

<input id="nameInput" placeholder="Your name">
<button onclick="register()">Begin Fishing</button>

<div class="water" id="water"></div>

<button id="castBtn" onclick="cast()">🎣 Cast Line</button>

<div id="log"></div>

<!-- POPUP -->
<div id="popup">
  <div id="popupBox">
    <h3>Change Name</h3>
    <input id="newName">
    <br><br>
    <button onclick="saveName()">Save</button>
    <button onclick="closePopup()">Cancel</button>
  </div>
</div>

<script>
const CONTRACT_ADDRESS = "0xA258E47F6A2D3CAf0469127677E5963093fbCA62"
const RPC = "https://studio.genlayer.com/api"

let user=null

function log(msg){
  document.getElementById("log").textContent=msg
}

async function connect(){
  const acc=await ethereum.request({method:"eth_requestAccounts"})
  user=acc[0]
  log("Connected: "+user)
}

async function read(fn,args=[]){
  const r=await fetch(RPC,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      jsonrpc:"2.0",
      method:"gen_call",
      params:[{to:CONTRACT_ADDRESS,data:{function:fn,args}}, "latest"],
      id:1
    })
  })
  const d=await r.json()
  return d.result
}

async function write(fn,args){
  const data=JSON.stringify({function:fn,args})
  let hex="0x"
  for(let i=0;i<data.length;i++){
    hex+=data.charCodeAt(i).toString(16)
  }

  return await ethereum.request({
    method:"eth_sendTransaction",
    params:[{
      from:user,
      to:CONTRACT_ADDRESS,
      data:hex
    }]
  })
}

async function register(){
  const name=document.getElementById("nameInput").value
  log("Registering...")

  await write("register",[name])

  await waitStats()
}

async function saveName(){
  const name=document.getElementById("newName").value
  await write("register",[name])
  closePopup()
  await waitStats()
}

async function cast(){
  const water=document.getElementById("water")
  water.classList.add("shake")

  log("Casting...")

  await write("cast",[])

  await waitCatch()

  water.classList.remove("shake")
}

async function waitStats(){
  for(let i=0;i<30;i++){
    await sleep(1000)
    const raw=await read("get_stats",[user])
    const s=JSON.parse(raw)

    if(s.name && s.name!=="Unknown"){
      log("Welcome "+s.name)
      return
    }
  }
  log("Timeout but maybe success")
}

async function waitCatch(){
  for(let i=0;i<40;i++){
    await sleep(1000)
    const raw=await read("get_stats",[user])
    const s=JSON.parse(raw)

    if(s.recent_catches.length){
      const c=s.recent_catches[s.recent_catches.length-1]
      showCatch(c)
      return
    }
  }
  log("No result yet")
}

function showCatch(c){
  const body=document.body

  if(c.rarity==="legendary"){
    body.classList.add("legendary-flash")
    setTimeout(()=>body.classList.remove("legendary-flash"),600)
  }

  if(c.rarity==="rare"){
    document.getElementById("water").classList.add("rare-glow")
  }

  if(c.rarity==="uncommon"){
    document.getElementById("water").classList.add("uncommon-glow")
  }

  log("🎣 "+c.fish+" | "+c.points+" pts")
}

function sleep(ms){return new Promise(r=>setTimeout(r,ms))}

function openRename(){
  document.getElementById("popup").style.display="flex"
}
function closePopup(){
  document.getElementById("popup").style.display="none"
}
</script>

</body>
</html>
