<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fishing Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: Arial, sans-serif;
}

/* FULL BACKGROUND */
body {
    background: url('banner.png') no-repeat center center;
    background-size: cover;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* DARK OVERLAY */
.overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.35);
    top: 0;
    left: 0;
}

/* CONNECT BUTTON */
#walletBtn {
    position: absolute;
    top: 20px;
    right: 20px;
    padding: 12px 20px;
    border-radius: 10px;
    border: none;
    background: #00cfff;
    font-weight: bold;
    cursor: pointer;
    z-index: 10;
}

/* CENTER BOX */
.center-box {
    position: relative;
    background: rgba(0,0,0,0.75);
    padding: 30px;
    border-radius: 16px;
    text-align: center;
    width: 340px;
    z-index: 5;
}

/* TITLE */
.center-box h2 {
    color: white;
    font-size: 26px;
    margin-bottom: 10px;
}

/* INPUT */
input {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: none;
    margin-top: 10px;
    font-size: 16px;
}

/* BUTTON */
button {
    margin-top: 15px;
    padding: 12px 20px;
    border-radius: 10px;
    border: none;
    background: #00cfff;
    font-weight: bold;
    cursor: pointer;
    font-size: 16px;
}

/* GAME UI */
#gameUI {
    display: none;
    position: absolute;
    bottom: 0;
    width: 100%;
    background: rgba(0,0,0,0.85);
    color: white;
    padding: 20px;
    text-align: center;
}
</style>
</head>

<body>

<div class="overlay"></div>

<button id="walletBtn">Connect Wallet</button>

<div class="center-box">
    <h2>🎣 Fishing Game</h2>
    <input placeholder="Enter nickname">
    <button>Start Game</button>
</div>

<div id="gameUI">
    Game UI here
</div>

</body>
</html>
