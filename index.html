<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GenLayer Fishing Game</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Inter', sans-serif;
  background: radial-gradient(circle at top, #0a1a2f, #020817);
  color:#e6f0ff;
}

/* WALLET */
.wallet-bar {
  position:fixed;
  top:20px;
  right:20px;
  z-index:999;
  display:flex;
  align-items:center;
  gap:10px;
}

#addr {
  background: rgba(0,212,255,0.1);
  padding:6px 10px;
  border-radius:20px;
  border:1px solid rgba(0,212,255,0.3);
  font-size:12px;
  color:#00d4ff;
}

.btn {
  padding:10px 18px;
  border:1px solid #00d4ff;
  background:transparent;
  color:#00d4ff;
  cursor:pointer;
  border-radius:6px;
  font-weight:600;
}
.btn:hover {
  background:#00d4ff;
  color:#001018;
}

/* CENTER */
.center-screen {
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  gap:20px;
}

.banner {
  width:100%;
  max-width:720px;
  border-radius:14px;
  box-shadow:0 0 60px rgba(0,212,255,0.3);
  transition:0.3s;
}
.banner:hover { transform:scale(1.03); }

h2 {
  font-family:'Cinzel', serif;
  font-size:2.2rem;
}

input {
  padding:12px;
  border-radius:6px;
  border:1px solid #00d4ff;
  background:#021020;
  color:white;
  width:250px;
}

.hidden { display:none }

/* GAME */
.game {
  max-width:1100px;
  margin:120px auto;
}

.stats {
  display:flex;
  gap:20px;
  justify-content:center;
  margin-bottom:20px;
}

.card {
  background:#04152a;
  padding:15px 20px;
  border-radius:10px;
  border:1px solid #0af;
  font-size:18px;
}

.cast-btn {
  font-size:20px;
  padding:15px 40px;
  margin-top:20px;
}

.result {
  margin-top:20px;
  font-size:22px;
  text-align:center;
}

/* SHOP */
.shop {
  margin-top:30px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.shop-item {
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#021020;
  padding:12px;
  border-radius:8px;
}
</style>
</head>

<body>

<!-- WALLET -->
<div class="wallet-bar">
  <span id="addr"></span>
  <button class="btn" onclick="connect()" id="connectBtn">Connect</button>
</div>

<!-- HERO -->
<div class="center-screen" id="hero">
  <img src="banner.png" class="banner">
  <h2>On-chain Fishing Game</h2>
  <p>For GenLayer Community</p>
  <button class="btn" onclick="connect()">Start Fishing</button>
</div>

<!-- REGISTER -->
<div class="center-screen hidden" id="register">
  <h2>Choose Your Name</h2>
  <input id="nameInput" placeholder="Your name">
  <button class="btn" onclick="register()">Register</button>
</div>

<!-- GAME -->
<div class="game hidden" id="game">

  <div class="stats">
    <div class="card">💰 Balance: <span id="balance">0</span></div>
    <div class="card">🏆 Total: <span id="total">0</span></div>
    <div class="card">🎣 Casts: <span id="casts">0</span></div>
  </div>

  <div style="text-align:center">
    <button class="btn cast-btn" onclick="cast()">🎣 CAST LINE</button>
  </div>

  <div class="result" id="result"></div>

  <div class="shop" id="shop"></div>

</div>

<script>
const CONTRACT = "0xA258E47F6A2D3CAf0469127677E5963093fbCA62"
const RPC = "https://studio.genlayer.com/api"

let user = null
let stats = null

async function rpcCall(fn, args=[]) {
  const res = await fetch(RPC,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      jsonrpc:"2.0",
      method:"gen_call",
      params:[{to:CONTRACT,data:{function:fn,args}}, "latest"],
      id:1
    })
  })
  const j = await res.json()
  return JSON.parse(j.result)
}

async function sendTx(fn,args) {
  const data = JSON.stringify({function:fn,args})
  let hex = "0x"
  for(let i=0;i<data.length;i++){
    hex += data.charCodeAt(i).toString(16)
  }
  return await ethereum.request({
    method:"eth_sendTransaction",
    params:[{from:user,to:CONTRACT,data:hex}]
  })
}

async function connect(){
  if (!window.ethereum) {
    alert("Install MetaMask first")
    return
  }

  const acc = await ethereum.request({method:"eth_requestAccounts"})
  user = acc[0]

  // show address
  const short = user.slice(0,6)+"..."+user.slice(-4)
  document.getElementById("addr").innerText = short

  document.getElementById("connectBtn").innerText = "Connected"

  document.getElementById("hero").classList.add("hidden")

  await load()
}

async function load(){
  try{
    stats = await rpcCall("get_stats",[user])

    if(!stats.name || stats.name==="Unknown"){
      document.getElementById("register").classList.remove("hidden")
    } else {
      startGame()
    }
  }catch{
    document.getElementById("register").classList.remove("hidden")
  }
}

async function register(){
  const name = document.getElementById("nameInput").value
  if(!name) return alert("Enter name")

  await sendTx("register",[name])

  document.getElementById("register").innerHTML = "Saving..."

  setTimeout(startGame,5000)
}

function startGame(){
  document.getElementById("register").classList.add("hidden")
  document.getElementById("game").classList.remove("hidden")
  refresh()
}

async function refresh(){
  stats = await rpcCall("get_stats",[user])

  document.getElementById("balance").innerText = stats.balance
  document.getElementById("total").innerText = stats.total_earned
  document.getElementById("casts").innerText = stats.total_casts

  renderShop()
}

async function cast(){
  document.getElementById("result").innerText = "Casting..."

  await sendTx("cast",[])

  setTimeout(async ()=>{
    await refresh()
    const last = stats.recent_catches.slice(-1)[0]

    document.getElementById("result").innerText =
      last.fish==="empty"
      ? "💨 Nothing..."
      : `🐟 ${last.fish} (+${last.points})`
  },5000)
}

function renderShop(){
  document.getElementById("shop").innerHTML = `
    <h3>Shop</h3>

    <div class="shop-item">
      Platinum Rod - 50
      <button onclick="buyRod('platinum')">Buy</button>
    </div>

    <div class="shop-item">
      Adamantite Rod - 150
      <button onclick="buyRod('adamantite')">Buy</button>
    </div>

    <div class="shop-item">
      Worm - 10
      <button onclick="buyBait('worm')">Buy</button>
    </div>

    <div class="shop-item">
      Shrimp - 20
      <button onclick="buyBait('shrimp')">Buy</button>
    </div>
  `
}

async function buyRod(r){
  await sendTx("buy_rod",[r])
  setTimeout(refresh,4000)
}

async function buyBait(b){
  await sendTx("buy_bait",[b])
  setTimeout(refresh,4000)
}
</script>

</body>
</html>
