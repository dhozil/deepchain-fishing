<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fishing Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: Arial, sans-serif;
}

/* BACKGROUND */
body {
    background: url('banner.png') no-repeat center center;
    background-size: cover;
}

/* OVERLAY */
.overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.25);
    top: 0;
    left: 0;
}

/* CONNECT BUTTON */
#walletBtn {
    position: absolute;
    top: 20px;
    right: 20px;
    padding: 12px 20px;
    border-radius: 12px;
    border: none;
    background: #00cfff;
    font-weight: bold;
    cursor: pointer;
    z-index: 10;
}

/* 🎯 MAIN BOX (INI KUNCI NYA) */
.center-box {
    position: absolute;
    top: 76%; /* 🔥 posisi turun dari tengah */
    left: 50%;
    transform: translate(-50%, -50%);
    
    background: rgba(0,0,0,0.65);
    padding: 30px;
    border-radius: 18px;
    text-align: center;
    width: 340px;
    z-index: 5;

    backdrop-filter: blur(10px);
}

/* TITLE */
.center-box h2 {
    color: white;
    font-size: 24px;
    margin-bottom: 15px;
}

/* INPUT */
input {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    margin-top: 10px;
    font-size: 15px;
}

/* BUTTON */
button {
    margin-top: 15px;
    padding: 12px 20px;
    border-radius: 10px;
    border: none;
    background: #00cfff;
    font-weight: bold;
    cursor: pointer;
    font-size: 16px;
}

/* GAME UI */
#gameUI {
    display: none;
    position: absolute;
    bottom: 0;
    width: 100%;
    background: rgba(0,0,0,0.85);
    color: white;
    padding: 20px;
    text-align: center;
}

/* FISHING GAME SCREEN */
#fishingScreen {
    display: none;
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(to bottom, #1e3c72, #2a5298);
    z-index: 20;
}

#fishingHeader {
    background: rgba(0,0,0,0.3);
    padding: 15px;
    text-align: center;
    color: white;
}

#fishingContent {
    padding: 20px;
    display: flex;
    gap: 20px;
    justify-content: space-between;
}

#fishingArea {
    flex: 1;
    text-align: center;
}

#castBtn {
    font-size: 24px;
    padding: 20px 40px;
    background: #ff6b6b;
    border-radius: 15px;
    margin: 20px 0;
}

#castBtn:disabled {
    background: #666;
    cursor: not-allowed;
}

#fishResult {
    margin: 20px 0;
    padding: 20px;
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
    min-height: 100px;
}

#sidePanel {
    width: 300px;
    background: rgba(0,0,0,0.3);
    border-radius: 10px;
    padding: 15px;
}

#stats, #shop {
    margin-bottom: 20px;
}

#stats h3, #shop h3 {
    margin-top: 0;
    color: #00cfff;
}

.shop-item {
    background: rgba(255,255,255,0.1);
    padding: 10px;
    margin: 5px 0;
    border-radius: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.shop-item button {
    margin: 0;
    padding: 5px 10px;
    font-size: 12px;
}

.shop-item button:disabled {
    background: #666;
    cursor: not-allowed;
}

/* STATUS */
#status {
    position: absolute;
    top: 70px;
    right: 20px;
    padding: 8px 15px;
    border-radius: 8px;
    background: rgba(255,255,255,0.9);
    color: #333;
    font-size: 14px;
    z-index: 10;
    display: none;
}

#status.error {
    background: #ff4444;
    color: white;
}

#status.success {
    background: #44ff44;
    color: white;
}

/* FISH ANIMATION */
@keyframes fishJump {
    0% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-20px) rotate(10deg); }
    100% { transform: translateY(0) rotate(0deg); }
}

.fish-emoji {
    font-size: 48px;
    animation: fishJump 0.5s ease-in-out;
}
</style>
</head>

<body>

<div class="overlay"></div>

<button id="walletBtn">Connect Wallet</button>

<div id="status"></div>

<!-- 🎯 BOX UTAMA -->
<div class="center-box">
    <h2>🎣 Fishing Game</h2>
    <input id="nicknameInput" placeholder="Enter your nickname">
    <button id="startBtn">Start Game</button>
</div>

<div id="gameUI"></div>

<!-- 🎣 FISHING GAME SCREEN -->
<div id="fishingScreen">
    <div id="fishingHeader">
        <h2 id="playerName">Player Name</h2>
        <div id="playerStats">Tokens: 0 | Rod Level: 1 | Bait: 0</div>
    </div>
    
    <div id="fishingContent">
        <div id="fishingArea">
            <button id="castBtn" onclick="castLine()">🎣 Cast Line</button>
            <div id="fishResult">
                <p>Cast your line to start fishing!</p>
            </div>
        </div>
        
        <div id="sidePanel">
            <div id="stats">
                <h3>📊 Stats</h3>
                <div id="statsContent">
                    <p>Total Fish: 0</p>
                    <p>Best Catch: None</p>
                </div>
            </div>
            
            <div id="shop">
                <h3>🛒 Shop</h3>
                <div id="shopContent"></div>
            </div>
        </div>
    </div>
</div>

<script>
// CONFIG
const STUDIONET_CHAIN_ID = "0xF22F";
const RPC_URL = "https://studio.genlayer.com/api";

// 🎣 FISH SYSTEM
const FISH_TYPES = {
    // Common
    'small_fish': { emoji: '🐟', name: 'Small Fish', tokens: 1, rarity: 'common' },
    'sardine': { emoji: '🐠', name: 'Sardine', tokens: 1, rarity: 'common' },
    'anchovy': { emoji: '🐡', name: 'Anchovy', tokens: 2, rarity: 'common' },
    
    // Rare
    'dolphin': { emoji: '🐬', name: 'Dolphin', tokens: 5, rarity: 'rare' },
    'tuna': { emoji: '🐠', name: 'Tuna', tokens: 4, rarity: 'rare' },
    'octopus': { emoji: '🐙', name: 'Octopus', tokens: 6, rarity: 'rare' },
    
    // Epic
    'shark': { emoji: '🦈', name: 'Shark', tokens: 12, rarity: 'epic' },
    'whale': { emoji: '🐋', name: 'Whale', tokens: 15, rarity: 'epic' },
    
    // Legendary
    'sea_dragon': { emoji: '🐉', name: 'Sea Dragon', tokens: 30, rarity: 'legendary' },
    'golden_fish': { emoji: '👑', name: 'Golden Fish', tokens: 25, rarity: 'legendary' }
};

// 🛒 SHOP SYSTEM
const SHOP_ITEMS = {
    rod_upgrade: {
        name: 'Rod Upgrade',
        getCost: (level) => level * 20,
        description: 'Upgrade fishing rod (Lv1→Lv2: 20, Lv2→Lv3: 40, Lv3→Lv4: 80)',
        action: 'upgradeRod'
    },
    bait: {
        name: 'Bait',
        cost: 5,
        description: 'Buy 3 bait (gives +1 token bonus)',
        action: 'buyBait'
    }
};

// STATE
let userAddress = null;
let isConnected = false;
let playerData = {
    nickname: '',
    tokens: 0,
    rodLevel: 1,
    bait: 0,
    totalFish: 0,
    bestCatch: null
};

// ELEMENTS
const walletBtn = document.getElementById('walletBtn');
const startBtn = document.getElementById('startBtn');
const nicknameInput = document.getElementById('nicknameInput');
const gameUI = document.getElementById('gameUI');
const status = document.getElementById('status');
const fishingScreen = document.getElementById('fishingScreen');
const castBtn = document.getElementById('castBtn');

// STATUS
function showStatus(message, type = '') {
    status.textContent = message;
    status.className = type;
    status.style.display = 'block';
    
    if (type === 'success') {
        setTimeout(() => status.style.display = 'none', 3000);
    }
}

// WALLET
async function connectWallet() {
    if (!window.ethereum) {
        showStatus('MetaMask not found', 'error');
        return;
    }
    
    try {
        const chain = await window.ethereum.request({ method: 'eth_chainId' });
        if (chain !== STUDIONET_CHAIN_ID) {
            await switchToStudioNet();
        }

        const accounts = await window.ethereum.request({ method: "eth_requestAccounts" });
        userAddress = accounts[0];
        isConnected = true;

        walletBtn.textContent = `🦊 ${userAddress.substring(0,6)}...${userAddress.slice(-4)}`;
        walletBtn.style.background = '#44ff44';

        showStatus('Connected!', 'success');
    } catch {
        showStatus('Connection failed', 'error');
    }
}

// NETWORK
async function switchToStudioNet() {
    try {
        await window.ethereum.request({
            method: "wallet_switchEthereumChain",
            params: [{ chainId: STUDIONET_CHAIN_ID }]
        });
    } catch (e) {
        if (e.code === 4902) {
            await window.ethereum.request({
                method: "wallet_addEthereumChain",
                params: [{
                    chainId: STUDIONET_CHAIN_ID,
                    chainName: "GenLayer Studio",
                    nativeCurrency: { name: "GEN", symbol: "GEN", decimals: 18 },
                    rpcUrls: [RPC_URL],
                    blockExplorerUrls: ["https://explorer-studio.genlayer.com"],
                }]
            });
        }
    }
}

// 🎣 GAME FUNCTIONS
function startGame() {
    const nickname = nicknameInput.value.trim();
    if (!nickname) {
        showStatus('Enter nickname', 'error');
        return;
    }

    if (!isConnected) {
        showStatus('Connect wallet first', 'error');
        return;
    }

    playerData.nickname = nickname;
    showFishingScreen();
}

function showFishingScreen() {
    document.querySelector('.center-box').style.display = 'none';
    fishingScreen.style.display = 'block';
    
    document.getElementById('playerName').textContent = `${playerData.nickname}'s Fishing Game`;
    updateStats();
    updateShop();
}

function updateStats() {
    document.getElementById('playerStats').textContent = 
        `Tokens: ${playerData.tokens} | Rod Level: ${playerData.rodLevel} | Bait: ${playerData.bait}`;
    
    document.getElementById('statsContent').innerHTML = `
        <p>Total Fish: ${playerData.totalFish}</p>
        <p>Best Catch: ${playerData.bestCatch || 'None'}</p>
    `;
}

function updateShop() {
    const shopContent = document.getElementById('shopContent');
    
    // Rod upgrade
    const rodUpgradeCost = SHOP_ITEMS.rod_upgrade.getCost(playerData.rodLevel);
    const canUpgradeRod = playerData.tokens >= rodUpgradeCost && playerData.rodLevel < 4;
    
    // Bait
    const canBuyBait = playerData.tokens >= SHOP_ITEMS.bait.cost;
    
    shopContent.innerHTML = `
        <div class="shop-item">
            <div>
                <strong>🎣 Rod Upgrade Lv${playerData.rodLevel}→${playerData.rodLevel + 1}</strong><br>
                <small>${rodUpgradeCost} tokens</small>
            </div>
            <button onclick="upgradeRod()" ${!canUpgradeRod ? 'disabled' : ''}>
                ${canUpgradeRod ? 'Upgrade' : 'Insufficient'}
            </button>
        </div>
        
        <div class="shop-item">
            <div>
                <strong>🪱 Bait (3x)</strong><br>
                <small>${SHOP_ITEMS.bait.cost} tokens (+1 token bonus)</small>
            </div>
            <button onclick="buyBait()" ${!canBuyBait ? 'disabled' : ''}>
                ${canBuyBait ? 'Buy' : 'Insufficient'}
            </button>
        </div>
    `;
}

// 🎣 CAST LINE
function castLine() {
    if (playerData.bait > 0) {
        playerData.bait--;
        updateStats();
    }
    
    castBtn.disabled = true;
    castBtn.textContent = '🎣 Fishing...';
    
    const fishResult = document.getElementById('fishResult');
    fishResult.innerHTML = '<p>🎣 Fishing... Wait for a bite!</p>';
    
    // Simulate fishing time (2-4 seconds)
    const fishingTime = 2000 + Math.random() * 2000;
    
    setTimeout(() => {
        const caughtFish = catchFish();
        displayFish(caughtFish);
        
        // Add tokens
        const tokenBonus = playerData.bait > 0 ? 1 : 0;
        const totalTokens = caughtFish.tokens + tokenBonus;
        playerData.tokens += totalTokens;
        
        // Update stats
        playerData.totalFish++;
        if (!playerData.bestCatch || caughtFish.tokens > playerData.bestCatch.tokens) {
            playerData.bestCatch = caughtFish;
        }
        
        // Update UI
        updateStats();
        updateShop();
        
        // Reset button
        castBtn.disabled = false;
        castBtn.textContent = '🎣 Cast Line';
        
        showStatus(`Caught ${caughtFish.name}! +${totalTokens} tokens`, 'success');
    }, fishingTime);
}

function catchFish() {
    // Drop rates based on rod level
    const dropRates = {
        common: 0.6 - (playerData.rodLevel * 0.05), // Better rods catch fewer common fish
        rare: 0.25 + (playerData.rodLevel * 0.03),
        epic: 0.1 + (playerData.rodLevel * 0.02),
        legendary: 0.05 + (playerData.rodLevel * 0.01)
    };
    
    // Normalize drop rates
    const total = Object.values(dropRates).reduce((a, b) => a + b, 0);
    Object.keys(dropRates).forEach(key => {
        dropRates[key] = dropRates[key] / total;
    });
    
    // Select rarity
    const random = Math.random();
    let cumulative = 0;
    let selectedRarity = 'common';
    
    for (const [rarity, rate] of Object.entries(dropRates)) {
        cumulative += rate;
        if (random <= cumulative) {
            selectedRarity = rarity;
            break;
        }
    }
    
    // Select fish from rarity
    const fishOfRarity = Object.entries(FISH_TYPES).filter(([_, fish]) => fish.rarity === selectedRarity);
    const selectedFish = fishOfRarity[Math.floor(Math.random() * fishOfRarity.length)][1];
    
    return selectedFish;
}

function displayFish(fish) {
    const fishResult = document.getElementById('fishResult');
    fishResult.innerHTML = `
        <div class="fish-emoji">${fish.emoji}</div>
        <h3>${fish.name}</h3>
        <p>Rarity: ${fish.rarity}</p>
        <p>Tokens: +${fish.tokens}</p>
        ${playerData.bait > 0 ? '<p>🪱 Bait Bonus: +1 token</p>' : ''}
    `;
}

// 🛒 SHOP ACTIONS
function upgradeRod() {
    const cost = SHOP_ITEMS.rod_upgrade.getCost(playerData.rodLevel);
    
    if (playerData.tokens >= cost && playerData.rodLevel < 4) {
        playerData.tokens -= cost;
        playerData.rodLevel++;
        
        updateStats();
        updateShop();
        showStatus(`Rod upgraded to Level ${playerData.rodLevel}!`, 'success');
    }
}

function buyBait() {
    const cost = SHOP_ITEMS.bait.cost;
    
    if (playerData.tokens >= cost) {
        playerData.tokens -= cost;
        playerData.bait += 3;
        
        updateStats();
        updateShop();
        showStatus('Bought 3 bait! +1 token bonus per catch', 'success');
    }
}

// EVENTS
walletBtn.addEventListener('click', connectWallet);
startBtn.addEventListener('click', startGame);

// WALLET EVENT LISTENERS
if (window.ethereum) {
    window.ethereum.on('accountsChanged', (accounts) => {
        if (accounts.length > 0) {
            userAddress = accounts[0];
            walletBtn.textContent = `🦊 ${userAddress.substring(0,6)}...${userAddress.slice(-4)}`;
        } else {
            userAddress = null;
            isConnected = false;
            walletBtn.textContent = 'Connect Wallet';
            walletBtn.style.background = '#00cfff';
        }
    });
}
</script>

</body>
</html>
