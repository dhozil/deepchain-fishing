<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fishing Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: Arial, sans-serif;
}

/* BACKGROUND */
body {
    background: url('banner.png') no-repeat center center;
    background-size: cover;
}

/* OVERLAY */
.overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.25);
    top: 0;
    left: 0;
}

/* CONNECT BUTTON */
#walletBtn {
    position: absolute;
    top: 20px;
    right: 20px;
    padding: 12px 20px;
    border-radius: 12px;
    border: none;
    background: #00cfff;
    font-weight: bold;
    cursor: pointer;
    z-index: 10;
}

/* 🎯 MAIN BOX (INI KUNCI NYA) */
.center-box {
    position: absolute;
    top: 76%; /* 🔥 posisi turun dari tengah */
    left: 50%;
    transform: translate(-50%, -50%);
    
    background: rgba(0,0,0,0.65);
    padding: 30px;
    border-radius: 18px;
    text-align: center;
    width: 340px;
    z-index: 5;

    backdrop-filter: blur(10px);
}

/* TITLE */
.center-box h2 {
    color: white;
    font-size: 24px;
    margin-bottom: 15px;
}

/* INPUT */
input {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    margin-top: 10px;
    font-size: 15px;
}

/* BUTTON */
button {
    margin-top: 15px;
    padding: 12px 20px;
    border-radius: 10px;
    border: none;
    background: #00cfff;
    font-weight: bold;
    cursor: pointer;
    font-size: 16px;
}

/* GAME UI */
#gameUI {
    display: none;
    position: absolute;
    bottom: 0;
    width: 100%;
    background: rgba(0,0,0,0.85);
    color: white;
    padding: 20px;
    text-align: center;
}

/* STATUS */
#status {
    position: absolute;
    top: 70px;
    right: 20px;
    padding: 8px 15px;
    border-radius: 8px;
    background: rgba(255,255,255,0.9);
    color: #333;
    font-size: 14px;
    z-index: 10;
    display: none;
}

#status.error {
    background: #ff4444;
    color: white;
}

#status.success {
    background: #44ff44;
    color: white;
}
</style>
</head>

<body>

<div class="overlay"></div>

<button id="walletBtn">Connect Wallet</button>

<div id="status"></div>

<!-- 🎯 BOX UTAMA -->
<div class="center-box">
    <h2>🎣 Fishing Game</h2>
    <input id="nicknameInput" placeholder="Enter your nickname">
    <button id="startBtn">Start Game</button>
</div>

<div id="gameUI"></div>

<script>
// CONFIG
const STUDIONET_CHAIN_ID = "0xF22F";
const RPC_URL = "https://studio.genlayer.com/api";

// STATE
let userAddress = null;
let isConnected = false;

// ELEMENTS
const walletBtn = document.getElementById('walletBtn');
const startBtn = document.getElementById('startBtn');
const nicknameInput = document.getElementById('nicknameInput');
const gameUI = document.getElementById('gameUI');
const status = document.getElementById('status');

// STATUS
function showStatus(message, type = '') {
    status.textContent = message;
    status.className = type;
    status.style.display = 'block';
    
    if (type === 'success') {
        setTimeout(() => status.style.display = 'none', 3000);
    }
}

// WALLET
async function connectWallet() {
    if (!window.ethereum) {
        showStatus('MetaMask not found', 'error');
        return;
    }
    
    try {
        const chain = await window.ethereum.request({ method: 'eth_chainId' });
        if (chain !== STUDIONET_CHAIN_ID) {
            await switchToStudioNet();
        }

        const accounts = await window.ethereum.request({ method: "eth_requestAccounts" });
        userAddress = accounts[0];
        isConnected = true;

        walletBtn.textContent = `🦊 ${userAddress.substring(0,6)}...${userAddress.slice(-4)}`;
        walletBtn.style.background = '#44ff44';

        showStatus('Connected!', 'success');
    } catch {
        showStatus('Connection failed', 'error');
    }
}

// NETWORK
async function switchToStudioNet() {
    try {
        await window.ethereum.request({
            method: "wallet_switchEthereumChain",
            params: [{ chainId: STUDIONET_CHAIN_ID }]
        });
    } catch (e) {
        if (e.code === 4902) {
            await window.ethereum.request({
                method: "wallet_addEthereumChain",
                params: [{
                    chainId: STUDIONET_CHAIN_ID,
                    chainName: "GenLayer Studio",
                    nativeCurrency: { name: "GEN", symbol: "GEN", decimals: 18 },
                    rpcUrls: [RPC_URL],
                    blockExplorerUrls: ["https://explorer-studio.genlayer.com"],
                }]
            });
        }
    }
}

// GAME
function startGame() {
    const nickname = nicknameInput.value.trim();
    if (!nickname) {
        showStatus('Enter nickname', 'error');
        return;
    }

    if (!isConnected) {
        showStatus('Connect wallet first', 'error');
        return;
    }

    gameUI.style.display = 'block';
    gameUI.innerHTML = `
        <h3>🎣 ${nickname}'s Fishing Game</h3>
        <button onclick="castLine()">Cast Line</button>
    `;
}

function castLine() {
    showStatus('Casting...', 'info');
    setTimeout(() => {
        showStatus('Fish caught! 🐟', 'success');
    }, 2000);
}

// EVENTS
walletBtn.addEventListener('click', connectWallet);
startBtn.addEventListener('click', startGame);
</script>

</body>
</html>
