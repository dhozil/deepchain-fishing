<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GenLayer Fishing Game</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@300;500&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Inter', sans-serif;
  color:#e6f0ff;
  overflow-x:hidden;
}

/* 🌊 OCEAN */
.ocean {
  position:fixed;
  width:100%;
  height:100%;
  background: linear-gradient(#0a1a2f, #020817);
  z-index:-1;
}

.wave {
  position:absolute;
  width:200%;
  height:200px;
  background: rgba(0,150,255,0.15);
  border-radius:40%;
  animation: waveMove 10s linear infinite;
}
.wave:nth-child(2){ top:60px; opacity:0.5; }
.wave:nth-child(3){ top:120px; opacity:0.3; }

@keyframes waveMove {
  from { transform:translateX(0); }
  to { transform:translateX(-50%); }
}

/* WALLET */
.wallet-bar {
  position:fixed;
  top:20px;
  right:20px;
  display:flex;
  gap:10px;
}

#addr {
  background: rgba(0,212,255,0.1);
  padding:6px 10px;
  border-radius:20px;
  border:1px solid rgba(0,212,255,0.3);
  font-size:12px;
  color:#00d4ff;
}

.btn {
  padding:10px 18px;
  border:1px solid #00d4ff;
  background:transparent;
  color:#00d4ff;
  cursor:pointer;
}
.btn:hover {
  background:#00d4ff;
  color:#001018;
}

/* CENTER */
.center {
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

/* GAME */
.game {
  margin-top:120px;
  text-align:center;
}

.stats {
  display:flex;
  justify-content:center;
  gap:20px;
}

.card {
  background:#04152a;
  padding:12px 20px;
  border-radius:10px;
}

/* 🎣 AREA */
.fishing-area {
  position:relative;
  height:250px;
  margin-top:40px;
}

.water {
  position:absolute;
  bottom:0;
  width:100%;
  height:120px;
  background: linear-gradient(to top, #0077be, #00c6ff);
}

/* rod */
.rod {
  position:absolute;
  left:50%;
  top:0;
  width:6px;
  height:100px;
  background:#ccc;
  transform-origin:top;
}

/* line */
.line {
  position:absolute;
  left:50%;
  top:100px;
  width:2px;
  height:0;
  background:#fff;
}

/* splash */
.splash {
  position:absolute;
  bottom:110px;
  left:50%;
  transform:translateX(-50%);
  font-size:30px;
  opacity:0;
}

/* 🐟 fish jump */
.fish {
  position:absolute;
  bottom:100px;
  left:50%;
  font-size:40px;
  opacity:0;
}

/* ✨ glow */
.glow {
  position:fixed;
  width:100%;
  height:100%;
  background: radial-gradient(circle, rgba(255,215,0,0.2), transparent);
  opacity:0;
  pointer-events:none;
}

/* animations */
@keyframes castRod {
  0%{transform:rotate(0)}
  50%{transform:rotate(-40deg)}
  100%{transform:rotate(0)}
}

@keyframes dropLine {
  from{height:0}
  to{height:120px}
}

@keyframes splashAnim {
  0%{opacity:0}
  50%{opacity:1}
  100%{opacity:0}
}

@keyframes fishJump {
  0%{opacity:0; transform:translateY(0)}
  50%{opacity:1; transform:translateY(-80px)}
  100%{opacity:0}
}

@keyframes glowFlash {
  0%{opacity:0}
  50%{opacity:1}
  100%{opacity:0}
}

.result {
  margin-top:20px;
  font-size:24px;
}
</style>
</head>

<body>

<div class="ocean">
  <div class="wave"></div>
  <div class="wave"></div>
  <div class="wave"></div>
</div>

<div class="glow" id="glow"></div>

<div class="wallet-bar">
  <span id="addr"></span>
  <button class="btn" onclick="connect()">Connect</button>
</div>

<div class="center" id="hero">
  <h1>Fishing Game</h1>
  <button class="btn" onclick="connect()">Start</button>
</div>

<div class="center hidden" id="register">
  <input id="nameInput" placeholder="Your name">
  <button class="btn" onclick="register()">Register</button>
</div>

<div class="game hidden" id="game">

  <div class="stats">
    <div class="card">💰 <span id="balance">0</span></div>
    <div class="card">🏆 <span id="total">0</span></div>
    <div class="card">🎣 <span id="casts">0</span></div>
  </div>

  <div class="fishing-area">
    <div class="rod" id="rod"></div>
    <div class="line" id="line"></div>
    <div class="splash" id="splash">💦</div>
    <div class="fish" id="fish">🐟</div>
    <div class="water"></div>
  </div>

  <button class="btn" onclick="cast()">🎣 CAST</button>

  <div class="result" id="result"></div>

</div>

<script>
const CONTRACT="0xA258E47F6A2D3CAf0469127677E5963093fbCA62"
const RPC="https://studio.genlayer.com/api"

let user

async function rpcCall(fn,args=[]){
  const r=await fetch(RPC,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      jsonrpc:"2.0",
      method:"gen_call",
      params:[{to:CONTRACT,data:{function:fn,args}},"latest"],
      id:1
    })
  })
  return JSON.parse((await r.json()).result)
}

async function sendTx(fn,args){
  let data=JSON.stringify({function:fn,args})
  let hex="0x"
  for(let i=0;i<data.length;i++) hex+=data.charCodeAt(i).toString(16)
  return ethereum.request({
    method:"eth_sendTransaction",
    params:[{from:user,to:CONTRACT,data:hex}]
  })
}

async function connect(){
  const acc=await ethereum.request({method:"eth_requestAccounts"})
  user=acc[0]
  document.getElementById("addr").innerText=user.slice(0,6)+"..."+user.slice(-4)
  document.getElementById("hero").classList.add("hidden")
  startGame()
}

function startGame(){
  document.getElementById("game").classList.remove("hidden")
  refresh()
}

async function refresh(){
  const s=await rpcCall("get_stats",[user])
  document.getElementById("balance").innerText=s.balance
  document.getElementById("total").innerText=s.total_earned
  document.getElementById("casts").innerText=s.total_casts
}

async function cast(){
  const rod=document.getElementById("rod")
  const line=document.getElementById("line")
  const splash=document.getElementById("splash")
  const fish=document.getElementById("fish")
  const glow=document.getElementById("glow")
  const result=document.getElementById("result")

  rod.style.animation="castRod 0.6s"
  setTimeout(()=>{line.style.animation="dropLine 0.6s forwards"},300)
  setTimeout(()=>{splash.style.animation="splashAnim 1s"},900)

  result.innerText="Fishing..."

  await sendTx("cast",[])

  setTimeout(async ()=>{
    const s=await rpcCall("get_stats",[user])
    const last=s.recent_catches.slice(-1)[0]

    if(last.rarity==="legendary"){
      fish.style.animation="fishJump 1s"
      glow.style.animation="glowFlash 1s"
      result.innerText="🔥 LEGENDARY "+last.fish+"!!!"
    }
    else if(last.rarity==="rare"){
      fish.style.animation="fishJump 0.8s"
      result.innerText="🌟 Rare "+last.fish
    }
    else{
      result.innerText=last.fish==="empty"?"💨 Nothing":"🐟 "+last.fish
    }

    rod.style.animation=""
    line.style.height="0"

  },5000)
}
</script>

</body>
</html>
