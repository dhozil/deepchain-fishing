<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GenLayer Fishing Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.min.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: url('banner.png') no-repeat center center/cover;
    height: 100vh;
}

/* overlay */
.overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.4);
}

/* wallet button */
#walletBtn {
    position: absolute;
    top: 20px;
    right: 20px;
    padding: 12px 20px;
    border-radius: 10px;
    border: none;
    background: #00cfff;
    font-weight: bold;
    cursor: pointer;
    z-index: 10;
}

/* center box */
.center-box {
    position: absolute;
    top: 72%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0,0,0,0.75);
    padding: 25px;
    border-radius: 12px;
    text-align: center;
    width: 320px;
}

.center-box h2 {
    color: white;
    font-size: 24px;
}

input {
    width: 90%;
    padding: 12px;
    border-radius: 6px;
    border: none;
    margin-top: 10px;
}

button {
    margin-top: 10px;
    padding: 10px 20px;
    border-radius: 8px;
    border: none;
    background: #00cfff;
    font-weight: bold;
    cursor: pointer;
}

/* game UI */
#gameUI {
    display: none;
    position: absolute;
    bottom: 0;
    width: 100%;
    background: rgba(0,0,0,0.9);
    color: white;
    padding: 20px;
}

#castBtn {
    background: gold;
    font-size: 18px;
}

/* result text */
#result {
    margin-top: 10px;
    font-size: 16px;
}
</style>
</head>

<body>

<div class="overlay"></div>

<button id="walletBtn">Connect Wallet</button>

<div class="center-box">
    <h2>🎣 Fishing Game</h2>
    <input id="nickname" placeholder="Enter nickname">
    <br>
    <button onclick="startGame()">Start Game</button>
</div>

<div id="gameUI">
    <div id="playerInfo"></div>
    <button id="castBtn" onclick="cast()">🎣 Cast</button>
    <div id="result"></div>
</div>

<script>

const CONTRACT_ADDRESS = "0xA258E47F6A2D3CAf0469127677E5963093fbCA62";

let provider;
let signer;
let contract;
let userAddress;

const ABI = [
    "function register(string name)",
    "function cast()",
    "function get_stats(address) view returns (string)"
];

async function connectWallet() {
    try {
        if (!window.ethereum) {
            alert("Please install MetaMask");
            return;
        }

        provider = new ethers.providers.Web3Provider(window.ethereum);

        await provider.send("eth_requestAccounts", []);

        signer = provider.getSigner();
        userAddress = await signer.getAddress();

        contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);

        document.getElementById("walletBtn").innerText =
            userAddress.slice(0,6) + "..." + userAddress.slice(-4);

    } catch (err) {
        console.error(err);
        alert("Connection failed");
    }
}

document.getElementById("walletBtn").onclick = connectWallet;

async function startGame() {
    if (!contract) {
        alert("Connect wallet first!");
        return;
    }

    const name = document.getElementById("nickname").value;

    if (!name) {
        alert("Enter nickname!");
        return;
    }

    try {
        const tx = await contract.register(name);
        await tx.wait();

        document.querySelector(".center-box").style.display = "none";
        document.getElementById("gameUI").style.display = "block";

        loadStats();

    } catch (err) {
        console.error(err);
        alert("Register failed");
    }
}

async function cast() {
    try {
        document.getElementById("result").innerText = "Casting...";

        const tx = await contract.cast();
        await tx.wait();

        loadStats();

    } catch (err) {
        console.error(err);
        document.getElementById("result").innerText = "Cast failed";
    }
}

async function loadStats() {
    try {
        const data = await contract.get_stats(userAddress);
        const parsed = JSON.parse(data);

        document.getElementById("playerInfo").innerText =
            "Player: " + parsed.name +
            " | Balance: " + parsed.balance;

        if (parsed.recent_catches.length > 0) {
            const last = parsed.recent_catches[parsed.recent_catches.length - 1];
            document.getElementById("result").innerText = last.message;
        }

    } catch (err) {
        console.error(err);
    }
}

</script>

</body>
</html>
