<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>GenLayer Fishing Game</title>
<script src="https://cdn.jsdelivr.net/npm/ethers@6.7.0/dist/ethers.umd.min.js"></script>

<style>
body {
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(#0a2540, #1e3c72);
    color:white;
    text-align:center;
}

/* HEADER */
#topbar {
    position:absolute;
    top:20px;
    right:20px;
}

button {
    padding:12px 20px;
    border:none;
    border-radius:10px;
    background:#00c6ff;
    color:black;
    font-weight:bold;
    cursor:pointer;
    margin:5px;
    font-size:16px;
}

button:hover {
    background:#00a2cc;
}

#container {
    margin-top:100px;
}

/* TITLE */
h1 {
    font-size:48px;
    margin-bottom:10px;
}

#subtitle {
    font-size:18px;
    opacity:0.8;
}

/* OCEAN ANIMATION */
#ocean {
    margin:30px auto;
    width:300px;
    height:150px;
    border-radius:20px;
    background: linear-gradient(#00c6ff, #0072ff);
    position:relative;
    overflow:hidden;
}

.wave {
    position:absolute;
    width:200%;
    height:100%;
    background: rgba(255,255,255,0.2);
    border-radius:40%;
    animation: wave 5s infinite linear;
}

.wave:nth-child(2){
    animation-delay: -2s;
}

@keyframes wave {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
}

/* FISHING LINE */
#line {
    position:absolute;
    width:2px;
    height:0;
    background:white;
    top:-50px;
    left:50%;
    transition: height 0.5s;
}

/* RESULT */
#result {
    margin-top:20px;
    font-size:20px;
}

/* STATS */
#stats {
    margin-top:20px;
    font-size:18px;
}
</style>

</head>

<body>

<div id="topbar">
    <button onclick="connectWallet()">Connect Wallet</button>
    <div id="wallet"></div>
</div>

<div id="container">
    <h1>Fishing Game</h1>
    <div id="subtitle">for GenLayer Community</div>

```
<div id="ocean">
    <div class="wave"></div>
    <div class="wave"></div>
    <div id="line"></div>
</div>

<div>
    <input id="nameInput" placeholder="Enter nickname">
    <button onclick="register()">Register</button>
</div>

<div>
    <button onclick="cast()">🎣 Cast</button>
</div>

<div id="result"></div>
<div id="stats"></div>
```

</div>

<script>
const CONTRACT = "0xA258E47F6A2D3CAf0469127677E5963093fbCA62";

let provider;
let signer;
let address;

/* CONNECT WALLET */
async function connectWallet(){
    if(!window.ethereum){
        alert("Install Metamask");
        return;
    }

    provider = new ethers.BrowserProvider(window.ethereum);
    await provider.send("eth_requestAccounts", []);
    signer = await provider.getSigner();
    address = await signer.getAddress();

    document.getElementById("wallet").innerText =
        address.slice(0,6) + "..." + address.slice(-4);

    loadStats();
}

/* SIMPLE CALL (MOCK GENLAYER) */
async function callContract(method, args=[]){
    try{
        // ⚠️ Ganti ini sesuai SDK genlayer kalau perlu
        console.log("Call:", method, args);

        return "{}";
    }catch(e){
        console.error(e);
    }
}

/* REGISTER */
async function register(){
    const name = document.getElementById("nameInput").value;

    if(!name) return alert("Enter name");

    document.getElementById("result").innerText = "Registering...";

    await callContract("register", [name]);

    document.getElementById("result").innerText = "Registered!";
}

/* CAST */
async function cast(){
    if(!address){
        alert("Connect wallet first");
        return;
    }

    const line = document.getElementById("line");

    // animasi turun
    line.style.height = "120px";

    document.getElementById("result").innerText = "Casting...";

    setTimeout(async ()=>{

        await callContract("cast");

        line.style.height = "0px";

        document.getElementById("result").innerText =
            "🎉 You caught something!";

        loadStats();

    }, 1500);
}

/* LOAD STATS */
async function loadStats(){
    if(!address) return;

    const data = await callContract("get_stats",[address]);

    document.getElementById("stats").innerText =
        "Stats loaded (mock)";
}

</script>

</body>
</html>
